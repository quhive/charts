    default: quay.io
    description: cainjector Image Registry
    type: string
    label: cainjector image name
  - variable: cainjector.image.repository
    default: jetstack/cert-manager-cainjector
    description: cainjector Image Repository
    type: string
    label: cainjector image name
  - variable: cainjector.image.tag
    default: v1.0.4
    description: cainjector image tag
    type: string
    label: cainjector Image Tag

- variable: cainjector.resources.requests.cpu
  default: 25m
  description: CPU Requests
  type: string
  required: true
  label: CPU Requests
