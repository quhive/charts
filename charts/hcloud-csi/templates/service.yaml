{{- if and .Values.metrics.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ template "hcloud-csi.fullname" . }}
  labels: {{ include "ehcloud-csi.labels" . | nindent 4 }}
spec:
  selector: {{ include "hcloud-csi.matchLabels" . | nindent 4 }}
  ports:
    - port: 9189
      name: metrics
      targetPort: metrics

---
apiVersion: v1
kind: Service
metadata:
  name: {{ template "hcloud-csi.fullname" . }}
  labels: {{ include "hcloud-csi.labels" . | nindent 4 }}
spec:
  selector: {{ include "hcloud-csi.matchLabels" . | nindent 4 }}
  ports:
    - port: 9189
      name: metrics
      targetPort: metrics
{{- end }}