apiVersion: v2
name: cert-manager
version: 1.0.4
appVersion: v1.0.4
kubeVersion: ">=v1.11.0"
description: cert-manager is a x509 certificate manager for Kubernetes.
home: https://github.com/jetstack/cert-manager
keywords:
- cert-manager
- certificates
sources:
- https://github.com/quhive/charts/tree/master/charts/cert-manager
- https://github.com/jetstack/cert-manager
maintainers:
- name: QuHive
  email: dev@quhive.dev
- name: munnerz
  email: james@jetstack.io
icon: https://raw.githubusercontent.com/jetstack/cert-manager/master/logo/logo.png
engine: gotpl
annotations:
  catalog.cattle.io/auto-install: cert-manager-crd=match
  catalog.cattle.io/certified: quhive
  catalog.cattle.io/namespace: cert-manager-system
  catalog.cattle.io/release-name: cert-manager
  catalog.cattle.io/display-name: "cert-manager"